<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>FinFlow AaaS — 跨境财税智能体控制台</title>
  <meta name="description" content="FinFlow Global AaaS — 面向跨境小微外贸商家的财税智能体云服务控制台" />
  <link rel="stylesheet" href="static/style.css?v=20260710" />
</head>
<body>
  <div class="app-layout">
    <div class="sidebar-backdrop" id="sidebar-backdrop"></div>
    <!-- ============ 侧边栏 ============ -->
    <aside class="sidebar" id="sidebar">
      <div class="logo">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 3v18h18" />
            <path d="M7 14l4-4 3 3 5-6" />
          </svg>
        </div>
        <div class="logo-text">
          <div class="logo-name">FinFlow</div>
          <div class="logo-sub">AaaS Console</div>
        </div>
      </div>

      <nav class="nav">
        <a href="#dashboard" class="nav-item" data-route="dashboard">
          <span class="nav-icon">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>
          </span>
          <span class="nav-label">总览仪表盘</span>
        </a>
        <a href="#receipts" class="nav-item" data-route="receipts">
          <span class="nav-icon">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 2v20l2-1 2 1 2-1 2 1 2-1 2 1 2-1 2 1V2l-2 1-2-1-2 1-2-1-2 1-2-1-2 1z"/><path d="M8 7h8"/><path d="M8 11h8"/><path d="M8 15h5"/></svg>
          </span>
          <span class="nav-label">票据中心</span>
          <span class="nav-badge nav-badge-hot">核心</span>
        </a>
        <a href="#agents" class="nav-item" data-route="agents">
          <span class="nav-icon">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="7" r="4"/><path d="M5.5 21a6.5 6.5 0 0 1 13 0"/><circle cx="6" cy="5" r="2"/><circle cx="18" cy="5" r="2"/></svg>
          </span>
          <span class="nav-label">Agent 集群</span>
        </a>
        <a href="#reports" class="nav-item" data-route="reports">
          <span class="nav-icon">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M8 13h8"/><path d="M8 17h5"/></svg>
          </span>
          <span class="nav-label">财税报表</span>
        </a>
        <a href="#gmi" class="nav-item" data-route="gmi">
          <span class="nav-icon">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h4l3-9 4 18 3-9h4"/></svg>
          </span>
          <span class="nav-label">GMI 监控</span>
        </a>
        <a href="#compliance-chat" class="nav-item" data-route="compliance-chat">
          <span class="nav-icon">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          </span>
          <span class="nav-label">合规咨询</span>
          <span class="nav-badge nav-badge-new">新</span>
        </a>
        <a href="#risk-assessment" class="nav-item" data-route="risk-assessment">
          <span class="nav-icon">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
          </span>
          <span class="nav-label">风险评估</span>
          <span class="nav-badge nav-badge-new">新</span>
        </a>
        <a href="#knowledge-base" class="nav-item" data-route="knowledge-base">
          <span class="nav-icon">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
          </span>
          <span class="nav-label">知识库</span>
          <span class="nav-badge nav-badge-new">新</span>
        </a>
        <a href="#api-docs" class="nav-item" data-route="api-docs">
          <span class="nav-icon">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
          </span>
          <span class="nav-label">API 文档</span>
        </a>
      </nav>

      <div class="sidebar-footer">
        <div class="token-budget-mini">
          <div class="token-budget-head">
            <span>Token 预算</span>
            <span id="sidebar-budget-pct">$50</span>
          </div>
          <div class="mini-progress">
            <div class="mini-progress-bar" id="sidebar-budget-bar" style="width:0%"></div>
          </div>
          <div class="token-budget-foot" id="sidebar-budget-text">连接后端中…</div>
        </div>
        <button class="menu-toggle" id="menu-toggle" title="折叠菜单">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
      </div>
    </aside>

    <!-- ============ 主内容区 ============ -->
    <main class="main">
      <header class="topbar">
        <div class="topbar-left">
          <button class="icon-btn sidebar-collapse" id="sidebar-collapse" title="收起侧边栏">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>
          <h1 class="page-title" id="page-title">总览仪表盘</h1>
        </div>
        <div class="topbar-right">
          <div class="conn-status" id="conn-status">
            <span class="conn-dot"></span>
            <span class="conn-text">连接中…</span>
          </div>
          <button class="icon-btn" id="refresh-btn" title="刷新数据">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
          </button>
          <div class="user-chip">
            <div class="avatar">FF</div>
            <div class="user-meta">
              <div class="user-name">FinFlow Admin</div>
              <div class="user-role">赛事账户</div>
            </div>
          </div>
        </div>
      </header>

      <div class="content" id="app">
        <!-- 页面由 app.js 渲染 -->
        <div class="loading-screen">
          <div class="loader"></div>
          <p>正在加载 FinFlow AaaS 控制台…</p>
        </div>
      </div>
    </main>
  </div>

  <!-- ============ 任务进度模态框 ============ -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <div class="modal-header">
        <div class="modal-title-wrap">
          <span class="modal-icon">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v4"/><path d="M12 18v4"/><path d="m4.93 4.93 2.83 2.83"/><path d="m16.24 16.24 2.83 2.83"/><path d="M2 12h4"/><path d="M18 12h4"/></svg>
          </span>
          <h3 class="modal-title" id="modal-title">智能体工作流进度</h3>
        </div>
        <button class="icon-btn modal-close" id="modal-close" title="关闭">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body" id="modal-body">
        <!-- 进度内容由 app.js 渲染 -->
      </div>
      <div class="modal-footer" id="modal-footer">
        <button class="btn btn-ghost" id="modal-cancel">取消任务</button>
        <button class="btn btn-primary" id="modal-done" style="display:none">查看报表</button>
      </div>
    </div>
  </div>

  <!-- ============ Toast 通知容器 ============ -->
  <div class="toast-container" id="toast-container"></div>

  <script src="static/app.js?v=20260710"></script>
</body>
</html>
